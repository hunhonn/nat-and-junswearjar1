services:
  - type: web
    name: swear-jar-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python swear_jar_bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: swear-jar-db
          property: connectionString

databases:
  - name: swear-jar-db
    databaseName: swearjar
    user: swearjar