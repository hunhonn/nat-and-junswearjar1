services:
  - type: web
    name: swear-jar-bot
    runtime: python
    runtimeVersion: "3.10"
    buildCommand: pip install -r requirements.txt
    startCommand: python swear_jar_bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false

databases:
  - name: swear-jar-db
    databaseName: swearjar
    user: swearjar